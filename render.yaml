services:
  - type: web
    name: task-manager-backend
    runtime: node
    buildCommand: cd server && npm install --include=dev && npm run build
    startCommand: cd server && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 5000
    healthCheckPath: /health
    plan: free
